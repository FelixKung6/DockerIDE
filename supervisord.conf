; ==============================================================================
; Supervisor 进程管理配置
; ==============================================================================
; 用途：管理 VNC、noVNC、SSH 等服务的启动和重启

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisor/supervisord.pid
loglevel=info

; ==============================================================================
; VNC 服务
; ==============================================================================
[program:vnc]
command=/usr/bin/vncserver :1 -geometry 1920x1200 -depth 24 -localhost no
user=__USER_NAME__
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/vnc.err.log
stdout_logfile=/var/log/supervisor/vnc.out.log
startsecs=5
startretries=3
environment=DISPLAY=":1",USER="${USER_NAME}"

; ==============================================================================
; Web VNC (noVNC)
; ==============================================================================
[program:novnc]
command=/usr/share/novnc/utils/novnc_proxy --vnc localhost:5901 --listen 6080 --web /usr/share/novnc
user=__USER_NAME__
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/novnc.err.log
stdout_logfile=/var/log/supervisor/novnc.out.log
startsecs=5
startretries=3
depends_on=vnc

; ==============================================================================
; SSH 服务
; ==============================================================================
[program:ssh]
command=/usr/sbin/sshd -D
user=root
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/ssh.err.log
stdout_logfile=/var/log/supervisor/ssh.out.log
startsecs=5
startretries=3